version: "3.8"

services:
  # ===== PostgreSQL Database =====
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Next.js Application =====
  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      NEXT_PUBLIC_BASE_URL: "https://maaref-haithem.com"
    ports:
      - "3000:3000"
    # Auto-push schema on first start
    command: >
      sh -c "
        npx drizzle-kit push --force 2>/dev/null || true &&
        npm start
      "

volumes:
  pgdata:

services:
  - type: web
    name: maaref-haithem
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: maaref-db
          property: connectionString
      - key: NEXT_PUBLIC_BASE_URL
        value: https://maaref-haithem.onrender.com

databases:
  - name: maaref-db
    plan: free
    region: frankfurt
    databaseName: app_db
    ipAllowList: []
